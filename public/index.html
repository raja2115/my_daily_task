<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Countdown Tracker</title>
    <meta name="description" content="Track your competitive exam countdowns with daily email alerts.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <header>
        <div class="header-content">
            <div>
                <h1>📚 Exam Tracker</h1>
                <p>Never miss an important exam again</p>
            </div>
            <a href="admin.html" class="btn-admin">+ Admin Panel</a>
        </div>
    </header>

    <main>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading your exams...</p>
        </div>
        <div id="exam-container" class="exam-grid"></div>
    </main>

    <!-- Floating Chatbot -->
    <div id="chatbot" class="chatbot">
        <div class="chatbot-toggle" id="chatbot-toggle">
            <span id="toggle-icon">💬</span>
        </div>
        <div class="chatbot-window" id="chatbot-window">
            <div class="chatbot-head">
                <span>🤖 Exam Bot</span>
                <button onclick="toggleChat()">✕</button>
            </div>
            <div class="chat-msgs" id="chat-msgs">
                <div class="msg bot">👋 Hi! Ask me about your exams. Try: "Next exam?" or "How many days left?"</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Ask about your exams...">
                <button id="chat-send">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
